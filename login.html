<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion | Meuble Concept Tunisie</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { direction: ltr; font-family: 'Tajawal', sans-serif; }
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem 1rem; position:relative; }
    .auth-page::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 60% 50% at 30% 20%,rgba(201,168,76,.07) 0%,transparent 60%),radial-gradient(ellipse 40% 40% at 80% 80%,rgba(201,168,76,.04) 0%,transparent 60%); pointer-events:none; }
    .auth-container { width:100%; max-width:440px; position:relative; z-index:1; }
    .auth-logo { text-align:center; margin-bottom:2rem; }
    .auth-logo-icon { width:64px; height:64px; background:linear-gradient(135deg,var(--gold),var(--gold2)); border-radius:16px; display:inline-flex; align-items:center; justify-content:center; font-size:1.75rem; margin-bottom:0.75rem; box-shadow:0 8px 30px rgba(201,168,76,.3); }
    .auth-logo h1 { font-family:'Orbitron',monospace; font-size:1rem; letter-spacing:3px; color:var(--gold2); text-transform:uppercase; }
    .auth-logo p { color:var(--text3); font-size:0.78rem; letter-spacing:2px; }
    .auth-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius2); padding:2.25rem; box-shadow:var(--shadow),var(--gold-glow); }
    .auth-title { font-size:1.4rem; font-weight:700; margin-bottom:0.35rem; }
    .auth-subtitle { color:var(--text2); font-size:0.88rem; margin-bottom:2rem; }
    .auth-footer { text-align:center; margin-top:1.5rem; color:var(--text3); font-size:0.88rem; }
    .auth-footer a { color:var(--gold2); text-decoration:none; font-weight:600; }
    .auth-footer a:hover { text-decoration:underline; }
    .divider-text { display:flex; align-items:center; gap:0.75rem; margin:1.5rem 0; color:var(--text3); font-size:0.82rem; }
    .divider-text::before, .divider-text::after { content:''; flex:1; height:1px; background:var(--border); }
    .back-home { display:flex; align-items:center; gap:0.4rem; color:var(--text3); text-decoration:none; font-size:0.85rem; justify-content:center; margin-top:1.5rem; transition:var(--transition); }
    .back-home:hover { color:var(--gold2); }
    .input-password-wrap { position:relative; }
    .toggle-pass { position:absolute; right:0.75rem; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text3); cursor:pointer; padding:0.25rem; }
    .toggle-pass:hover { color:var(--gold2); }
    /* WhatsApp link */
    .wa-help { display:inline-flex; align-items:center; gap:0.4rem; color:#25D366; font-size:0.82rem; text-decoration:none; margin-top:0.5rem; }
    .wa-help:hover { text-decoration:underline; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-icon">🛋️</div>
      <h1>Meuble Concept</h1>
      <p>Design & Furniture</p>
    </div>

    <div class="auth-card">
      <h2 class="auth-title">Bienvenue 👋</h2>
      <p class="auth-subtitle">Connectez-vous à votre compte pour continuer</p>

      <div id="alert-container"></div>

      <div class="form-group">
        <label class="form-label">Adresse e-mail</label>
        <input type="email" class="form-input" id="email" placeholder="exemple@email.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <div class="input-password-wrap">
          <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password" />
          <button class="toggle-pass" id="toggle-pass" type="button" tabindex="-1">
            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn btn-primary btn-full btn-lg" id="login-btn" style="margin-top:0.5rem;">
        Se connecter
      </button>

      <div style="text-align:center;margin-top:0.75rem;">
        <a href="https://wa.me/21600000000" target="_blank" class="wa-help">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Besoin d'aide ? WhatsApp
        </a>
      </div>

      <div class="divider-text">ou</div>

      <div class="auth-footer" style="margin-top:0;">
        Pas encore de compte ? <a href="register.html">Créer un compte</a>
      </div>
    </div>

    <a href="index.html" class="back-home">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      Retour à l'accueil
    </a>
  </div>
</div>

<script type="module">
  import { login, getCurrentUser } from './js/auth.js';

  getCurrentUser().then(user => {
    if (user) window.location.href = '/index.html';
  });

  const alertBox = document.getElementById('alert-container');
  const loginBtn = document.getElementById('login-btn');

  function showAlert(msg, type = 'error') {
    alertBox.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  }

  document.getElementById('toggle-pass').addEventListener('click', () => {
    const input = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  });

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) { showAlert('Veuillez remplir tous les champs'); return; }

    loginBtn.disabled = true;
    loginBtn.textContent = 'Connexion en cours...';
    alertBox.innerHTML = '';

    try {
      await login(email, password);
      showAlert('Connexion réussie ! Redirection...', 'success');
      setTimeout(() => {
        const redirect = new URLSearchParams(window.location.search).get('redirect') || '/index.html';
        window.location.href = redirect;
      }, 1000);
    } catch (e) {
      showAlert(e.message === 'Invalid login credentials' ? 'Email ou mot de passe incorrect' : e.message);
      loginBtn.disabled = false;
      loginBtn.textContent = 'Se connecter';
    }
  }

  loginBtn.addEventListener('click', handleLogin);
  document.getElementById('password').addEventListener('keypress', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
