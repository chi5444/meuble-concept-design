<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول | Meuble Concept Design</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
    }

    .auth-page::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse 60% 50% at 30% 20%, rgba(201,168,76,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(201,168,76,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .auth-container {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      margin-bottom: 0.75rem;
      box-shadow: 0 8px 30px rgba(201,168,76,0.3);
    }

    .auth-logo h1 {
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      letter-spacing: 3px;
      color: var(--gold2);
      text-transform: uppercase;
    }

    .auth-logo p { color: var(--text3); font-size: 0.78rem; letter-spacing: 2px; }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius2);
      padding: 2.25rem;
      box-shadow: var(--shadow), var(--gold-glow);
    }

    .auth-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
    }

    .auth-subtitle {
      color: var(--text2);
      font-size: 0.88rem;
      margin-bottom: 2rem;
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text3);
      font-size: 0.88rem;
    }

    .auth-footer a {
      color: var(--gold2);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover { text-decoration: underline; }

    .divider-text {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
      color: var(--text3);
      font-size: 0.82rem;
    }

    .divider-text::before, .divider-text::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .back-home {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text3);
      text-decoration: none;
      font-size: 0.85rem;
      justify-content: center;
      margin-top: 1.5rem;
      transition: var(--transition);
    }

    .back-home:hover { color: var(--gold2); }

    .input-password-wrap { position: relative; }
    .toggle-pass {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      padding: 0.25rem;
    }

    .toggle-pass:hover { color: var(--gold2); }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-icon">🛋️</div>
      <h1>Meuble Concept</h1>
      <p>Design & Furniture</p>
    </div>

    <div class="auth-card">
      <h2 class="auth-title">مرحباً بعودتك 👋</h2>
      <p class="auth-subtitle">سجّل الدخول إلى حسابك للمتابعة</p>

      <div id="alert-container"></div>

      <div class="form-group">
        <label class="form-label">البريد الإلكتروني</label>
        <input type="email" class="form-input" id="email" placeholder="example@email.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <div class="input-password-wrap">
          <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password" />
          <button class="toggle-pass" id="toggle-pass" type="button" tabindex="-1">
            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn btn-primary btn-full btn-lg" id="login-btn" style="margin-top:0.5rem;">
        تسجيل الدخول
      </button>

      <div class="divider-text">أو</div>

      <div class="auth-footer" style="margin-top:0;">
        ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a>
      </div>
    </div>

    <a href="index.html" class="back-home">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      العودة للرئيسية
    </a>
  </div>
</div>

<script type="module">
  import { login, getCurrentUser } from './js/auth.js';

  // Redirect if already logged in
  getCurrentUser().then(user => {
    if (user) window.location.href = '/index.html';
  });

  const alertBox = document.getElementById('alert-container');
  const loginBtn = document.getElementById('login-btn');

  function showAlert(msg, type = 'error') {
    alertBox.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  }

  document.getElementById('toggle-pass').addEventListener('click', () => {
    const input = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  });

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showAlert('يرجى ملء جميع الحقول');
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = 'جاري الدخول...';
    alertBox.innerHTML = '';

    try {
      await login(email, password);
      showAlert('تم تسجيل الدخول بنجاح! جاري التحويل...', 'success');
      setTimeout(() => {
        const redirect = new URLSearchParams(window.location.search).get('redirect') || '/index.html';
        window.location.href = redirect;
      }, 1000);
    } catch (e) {
      showAlert(e.message === 'Invalid login credentials' ? 'البريد الإلكتروني أو كلمة المرور غير صحيحة' : e.message);
      loginBtn.disabled = false;
      loginBtn.textContent = 'تسجيل الدخول';
    }
  }

  loginBtn.addEventListener('click', handleLogin);

  document.getElementById('password').addEventListener('keypress', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
